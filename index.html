<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/pages/index.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta content="ie=edge" http-equiv="X-UA-Complatible" />
    <title>Around The U.S</title>
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img src="/images/Vector.png" alt="Around the u.s logo" class="logo" />
      </header>
      <main class="contnt">
        <section class="gallery page__section">
          <div class="profile">
            <img
              src="/images/Avatar.png"
              alt="Avatar"
              class="gallery__avatar"
            />
            <div class="gallery__profile">
              <h1 class="gallery__title">Jacques Cousteau</h1>
              <button class="gallery__button"></button>
              <p class="gallery__subtitle">Explorer</p>
            </div>
            <button class="gallery__button-plus"></button>
          </div>
        </section>
        <section class="cards">
          <ul class="card__list">
            <li class="card">
              <img class="card__image" src="/images/yosemite.jpg" alt="" />
              <div class="card__description">
                <h2 class="card__title">Yosemite Valley</h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="/images/lake-louise.jpg" alt="" />
              <div class="card__description">
                <h2 class="card__title">Lake Louise</h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">
              <img
                class="card__image"
                src="/images/bald-mountains.jpg"
                alt=""
              />
              <div class="card__description">
                <h2 class="card__title">Bald-mountains</h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="/images/latemar.jpg" alt="" />
              <div class="card__description">
                <h2 class="card__title">Latemar</h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>

            <li class="card">
              <img class="card__image" src="/images/vanoise.jpg" alt="" />
              <div class="card__description">
                <h2 class="card__title">Vanoise Nationa...</h2>
                <button class="card__like-button" type="button"></button>

                <li class="card">
                  <img class="card__image" src="/images/lago.jpg" alt="" />
                  <div class="card__description">
                    <h2 class="card__title">Lago di Braies</h2>
                    <button class="card__like-button" type="button"></button>
                  </div>
                </li>
              </div>
            </li>
          </ul>
        </section>
      </main>
    </div>
  </body>
</html>
