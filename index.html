<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/pages/index.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />

    <title>Around The U.S</title>

  <body class="page">
    <div class="page__content">
      <header class="page__section">
        <img src="/images/Vector.png" alt="Around the u.s logo" />
      </header>
      <main class="contnt">
        <section class="gallery page__section">
          <div class="profile">
            <img

              alt="Avatar"
              class="gallery__avatar"
            />
            <div class="gallery__profile">
              <h1 class="gallery__title">Jacques Cousteau</h1>
              <button class="gallery__button"></button>
              <p class="gallery__subtitle">Explorer</p>
            </div>
            <button class="gallery__button-plus"></button>
          </div>
          <ul class="gallery__cards">
            <li class="card">
              <img class="card__image" src="" alt="" />
              <div class="card__description">
                <h2 class="card__title"></h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">

              <div class="card__description">

                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">

              <div class="card__description">
                <h2 class="card__title"></h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
            <li class="card">
              <img class="card__image" src="" alt="" />
              <div class="card__description">
                <h2 class="card__title"></h2>
                <button class="card__like-button" type="button"></button>
              </div>
            </li>
          </ul>
        </section>
      </main>
    </div>

</html>
